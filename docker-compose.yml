version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: slimlight-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: slimlight
      POSTGRES_USER: slimlight
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  search:
    image: getmeili/meilisearch:v1.6
    container_name: slimlight-search
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-change_me}
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data

  redis:
    image: redis:7-alpine
    container_name: slimlight-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: slimlight-mail
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  postgres_data:
  meilisearch_data:
  redis_data:
